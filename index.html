<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Ngày Cần Rút</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<style>
:root { --primary:#ff7a00; }

body {
  font-family: 'Segoe UI', sans-serif;
  background:#fff7f0;
  margin:0;
  padding:15px;
}

.container {
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

.header {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
}

h1 {
  margin:0;
  color:var(--primary);
}

.warning {
  cursor:pointer;
  color:red;
  font-size:20px;
}

.today, #statusBox {
  text-align:center;
  margin:5px 0;
  font-weight:bold;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
}

.input-item {
  display:flex;
  gap:10px;
  margin-top:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* Popup */
#warningPopup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-box {
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:320px;
  text-align:center;
}

button {
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
}

/* Splash */
#splash {
  position:fixed;
  inset:0;
  background:var(--primary);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
  z-index:9999;
}
</style>
</head>

<body>

<div id="splash">KINGFOOD MART</div>

<div class="container">

  <div class="header">
    <h1>TÍNH NGÀY CẦN RÚT</h1>
    <span class="warning" id="warningBtn">❗</span>
  </div>

  <div class="today" id="todayBox"></div>
  <div id="statusBox"></div>

  <div id="result"></div>
  <div id="customList"></div>

</div>

<!-- Popup -->
<div id="warningPopup">
  <div class="popup-box">
    <p>
      Đây là tool tính ngày cần rút sử dụng nội bộ VH3.<br><br>
      Việc sử dụng ngoài nội bộ VH3 là không khuyến khích.<br><br>
      Các sai sót ngoài nội bộ VH3 được miễn trừ trách nhiệm.
    </p>
    <button onclick="closeWarning()">Đóng</button>
  </div>
</div>

<script>
// Splash
setTimeout(()=>{ splash.style.display='none'; },1000);

// Load rules
let RULES = {};

fetch('rules.json')
.then(res => res.json())
.then(data=>{
  RULES = data;
  init();
});

// Format date
function formatDate(d){
  return d.toLocaleDateString('vi-VN');
}

// Get minus
function getMinus(a){
  for(let r of RULES.rules){
    if(a >= r.min && a <= r.max){
      if(r.type === 'fixed') return r.value;
      if(r.type === 'formula'){
        return eval(r.value.replace('a', a));
      }
    }
  }
  return null;
}

// Main calc
function calcDate(a){
  let today = new Date();
  let tomorrow = new Date(today);
  tomorrow.setDate(today.getDate()+1);

  if(a > RULES.maxLimit) return RULES.overText;

  let minus = getMinus(a);
  if(minus === null) return "";

  let r = new Date(tomorrow);
  r.setDate(tomorrow.getDate() - minus);

  return formatDate(r);
}

// Render
function renderToday(){
  todayBox.innerText = "Hôm nay: " + formatDate(new Date());
}

function renderDefault(){
  let days=[4,5,6,7,9,10,15];
  result.innerHTML = days.map(d=>`
    <div class="row">
      <span>${d} ngày</span>
      <strong>${calcDate(d)}</strong>
    </div>
  `).join('');
}

function addRow(){
  let wrap=document.createElement('div');
  wrap.className='input-item';

  let input=document.createElement('input');
  input.type='number';
  input.placeholder='Nhập ngày...';

  let result=document.createElement('div');

  input.oninput=()=>{
    let a=parseInt(input.value);
    if(!a){
      result.innerText='';
      return;
    }

    result.innerText = calcDate(a);

    if(customList.lastChild === wrap) addRow();
  }

  wrap.append(input,result);
  customList.appendChild(wrap);
}

// Status
function updateStatus(){
  if(navigator.onLine){
    statusBox.innerText = "🟢 Đang online";
    statusBox.style.color = "green";
  }else{
    statusBox.innerText = "🟠 Đang offline";
    statusBox.style.color = "orange";
  }
}

window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);

// Warning popup
warningBtn.onclick = ()=>{
  warningPopup.style.display = 'flex';
}

function closeWarning(){
  warningPopup.style.display = 'none';
}

// Init
function init(){
  renderToday();
  renderDefault();
  addRow();
  updateStatus();
}

// PWA + auto update
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js').then(reg=>{
    reg.onupdatefound=()=>{
      let newWorker=reg.installing;
      newWorker.onstatechange=()=>{
        if(newWorker.state==='installed' && navigator.serviceWorker.controller){
          location.reload();
        }
      }
    }
  });
}
</script>

</body>
</html>
