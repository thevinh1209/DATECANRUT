<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Ngày Cần Rút</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<style>
:root { --primary:#ff7a00; }
body { font-family: 'Segoe UI'; background:#fff7f0; padding:15px; }
.container { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:16px; }
h1 { text-align:center; color:var(--primary); }
.row { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; }
.today { text-align:center; font-weight:bold; color:var(--primary); margin:10px 0; }
.input-item { display:flex; gap:10px; margin-top:10px; }
input { flex:1; padding:10px; }
</style>
</head>

<body>

<div class="container">
  <h1>TÍNH NGÀY CẦN RÚT</h1>
  <div class="today" id="todayBox"></div>
  <div id="result"></div>
  <div id="customList"></div>
</div>

<script>
let RULES = [];

fetch('rules.json')
  .then(res => res.json())
  .then(data => {
    RULES = data;
    init();
  });

function formatDate(d){
  return d.toLocaleDateString('vi-VN');
}

function getMinus(a){
  for(let r of RULES.rules){
    if(a >= r.min && a <= r.max){
      if(r.type === 'fixed') return r.value;
      if(r.type === 'formula'){
        return eval(r.value.replace('a', a));
      }
    }
  }
  return null;
}

function calcDate(a){
  let today = new Date();
  let tomorrow = new Date(today);
  tomorrow.setDate(today.getDate()+1);

  if(a > RULES.maxLimit) return RULES.overText;

  let minus = getMinus(a);
  if(minus === null) return "";

  let r = new Date(tomorrow);
  r.setDate(tomorrow.getDate() - minus);

  return formatDate(r);
}

function renderToday(){
  todayBox.innerText = "Hôm nay: " + formatDate(new Date());
}

function renderDefault(){
  let days=[4,5,6,7,9,10,15];
  result.innerHTML = days.map(d=>`
    <div class="row">
      <span>${d} ngày</span>
      <strong>${calcDate(d)}</strong>
    </div>
  `).join('');
}

function addRow(){
  let wrap=document.createElement('div');
  wrap.className='input-item';

  let input=document.createElement('input');
  input.type='number';

  let result=document.createElement('div');

  input.oninput=()=>{
    let a=parseInt(input.value);
    if(!a) return;

    result.innerText = calcDate(a);

    if(customList.lastChild === wrap) addRow();
  }

  wrap.append(input,result);
  customList.appendChild(wrap);
}

function init(){
  renderToday();
  renderDefault();
  addRow();
}

// PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
