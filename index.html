<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Ngày Cần Rút</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --primary: #ff7a00;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background:#fff7f0;
  margin:0;
  padding:15px;
}

.container {
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

h1 {
  text-align:center;
  color:var(--primary);
}

.today {
  text-align:center;
  margin:10px 0;
  font-weight:bold;
  color:var(--primary);
}

.row {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
}

.input-item {
  display:flex;
  gap:10px;
  margin-top:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>TÍNH NGÀY CẦN RÚT</h1>

  <div class="today" id="todayBox"></div>

  <div id="result"></div>
  <div id="customList"></div>
</div>

<script>
function formatDate(d){
  return d.toLocaleDateString('vi-VN');
}

function calcDate(a){
  let today = new Date();
  let tomorrow = new Date(today);
  tomorrow.setDate(today.getDate()+1);

  if(a > 179) return "tui làm biến tính lắm. tự tính đi";

  let offset = 0;

  if(a === 4) return formatDate(tomorrow);
  if([5,6,7].includes(a)) offset = 1;
  if([9,10,15].includes(a)) offset = 2;

  if(a>=8 && a<=29) offset=2;
  if(a>=30 && a<=59) offset=3;
  if(a>=60 && a<=179) offset=6;

  let r = new Date(tomorrow);
  r.setDate(tomorrow.getDate() - a + offset);

  return formatDate(r);
}

function renderToday(){
  let t = new Date();
  document.getElementById('todayBox').innerText =
    "Hôm nay: " + formatDate(t);
}

function renderDefault(){
  let days=[4,5,6,7,9,10,15];
  let html='';

  days.forEach(d=>{
    html += `<div class="row">
      <span>${d} ngày</span>
      <strong>${calcDate(d)}</strong>
    </div>`;
  });

  document.getElementById('result').innerHTML = html;
}

function addRow(){
  let container = document.getElementById('customList');

  let wrap = document.createElement('div');
  wrap.className='input-item';

  let input = document.createElement('input');
  input.type='number';
  input.placeholder='Nhập ngày...';

  let result = document.createElement('div');

  input.addEventListener('input', ()=>{
    let a = parseInt(input.value);
    if(!a) return;

    result.innerText = calcDate(a);

    if(container.lastChild === wrap){
      addRow();
    }
  });

  wrap.appendChild(input);
  wrap.appendChild(result);
  container.appendChild(wrap);
}

renderToday();
renderDefault();
addRow();

/* PWA */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
