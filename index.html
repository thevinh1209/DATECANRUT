<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Ngày Cần Rút</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<style>
:root { --primary:#ff7a00; }

body {
  font-family: 'Segoe UI', sans-serif;
  background:#fff7f0;
  margin:0;
  padding:15px;
}

.container {
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

h1 {
  text-align:center;
  color:var(--primary);
}

.today {
  text-align:center;
  margin:10px 0;
  font-weight:bold;
  color:var(--primary);
}

.row {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
}

.input-item {
  display:flex;
  gap:10px;
  margin-top:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* Splash */
#splash {
  position:fixed;
  inset:0;
  background:var(--primary);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
  z-index:9999;
}
</style>
</head>

<body>

<div id="splash">KINGFOOD MART</div>

<div class="container">
  <h1>TÍNH NGÀY CẦN RÚT</h1>
  <div class="today" id="todayBox"></div>

  <div id="result"></div>
  <div id="customList"></div>
</div>

<script>
setTimeout(()=>{
  document.getElementById('splash').style.display='none';
},1200);

function formatDate(d){
  return d.toLocaleDateString('vi-VN');
}

function calcDate(a){
  let today = new Date();
  let tomorrow = new Date(today);
  tomorrow.setDate(today.getDate()+1);

  if(a > 179) return "tui làm biến tính lắm. tự tính đi";

  let r = new Date(tomorrow);

  // LOGIC FINAL
  if(a === 4){
    r.setDate(tomorrow.getDate() - 3);
  } else {
    r.setDate(tomorrow.getDate() - (a - 2));
  }

  return formatDate(r);
}

function renderToday(){
  let t = new Date();
  document.getElementById('todayBox').innerText =
    "Hôm nay: " + formatDate(t);
}

function renderDefault(){
  let days=[4,5,6,7,9,10,15];
  let html='';

  days.forEach(d=>{
    html += `<div class="row">
      <span>${d} ngày</span>
      <strong>${calcDate(d)}</strong>
    </div>`;
  });

  document.getElementById('result').innerHTML = html;
}

function addRow(){
  let container = document.getElementById('customList');

  let wrap = document.createElement('div');
  wrap.className='input-item';

  let input = document.createElement('input');
  input.type='number';
  input.placeholder='Nhập ngày...';

  let result = document.createElement('div');

  input.addEventListener('input', ()=>{
    let a = parseInt(input.value);
    if(!a){
      result.innerText='';
      return;
    }

    result.innerText = calcDate(a);

    if(container.lastChild === wrap){
      addRow();
    }
  });

  wrap.appendChild(input);
  wrap.appendChild(result);
  container.appendChild(wrap);
}

renderToday();
renderDefault();
addRow();

// PWA + auto update
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js').then(reg=>{
    reg.onupdatefound=()=>{
      let newWorker=reg.installing;
      newWorker.onstatechange=()=>{
        if(newWorker.state==='installed' && navigator.serviceWorker.controller){
          location.reload();
        }
      }
    }
  });
}
</script>

</body>
</html>
